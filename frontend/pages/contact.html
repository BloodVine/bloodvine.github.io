<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Complex App</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>ComplexApp</h2>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="/" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="chat.html" class="nav-link">Chat</a>
                <a href="contact.html" class="nav-link active">Contact</a>
                <div class="nav-auth" id="navAuth">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="nav-link nav-button">Sign Up</a>
                </div>
                <div class="nav-user" id="navUser" style="display: none;">
                    <span id="userName"></span>
                    <button onclick="logout()" class="nav-link nav-button">Logout</button>
                </div>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Get in touch with our team. We'd love to hear from you!</p>

            <div class="form-container">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name *</label>
                        <input type="text" id="name" name="name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email Address *</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="subject" class="form-label">Subject *</label>
                        <input type="text" id="subject" name="subject" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="message" class="form-label">Message *</label>
                        <textarea id="message" name="message" rows="6" class="form-input" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Send Message
                    </button>
                </form>
            </div>

            <div class="card">
                <h3>Other Ways to Reach Us</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 1rem;">
                    <div>
                        <h4><i class="fas fa-envelope"></i> Email</h4>
                        <p>support@complexapp.com</p>
                    </div>
                    <div>
                        <h4><i class="fas fa-phone"></i> Phone</h4>
                        <p>+1 (555) 123-4567</p>
                    </div>
                    <div>
                        <h4><i class="fas fa-clock"></i> Hours</h4>
                        <p>Monday - Friday: 9:00 AM - 6:00 PM</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Complex App. All rights reserved.</p>
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/contact.js"></script>
</body>
</html>
